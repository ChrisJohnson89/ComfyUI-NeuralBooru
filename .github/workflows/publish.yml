name: Publish to Comfy Registry

# Publishes a new version to the ComfyUI Registry whenever the version in
# pyproject.toml changes on main. Can also be run manually from the Actions tab.
# Requires the REGISTRY_ACCESS_TOKEN repo secret (a registry API key).

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

permissions:
  issues: write

jobs:
  publish-node:
    name: Publish custom node to registry
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ChrisJohnson89' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Publish custom node
        uses: Comfy-Org/publish-node-action@v1
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
